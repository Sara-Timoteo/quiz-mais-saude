<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1B4332">
  <title>Quiz Mais Saúde</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/svg+xml" href="./icon.svg">
  <link rel="apple-touch-icon" href="./icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Outfit:wght@300;400;500;600&display=swap">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main id="app">

    <!-- ====== LOGIN ====== -->
    <section class="view" data-view="login">
      <header class="brand">
        <span class="brand__mark" aria-hidden="true">+</span>
        <h1 class="brand__name">Quiz <em>Mais Saúde</em></h1>
      </header>
      <form id="login-form" class="card" novalidate>
        <h2>Entrar</h2>
        <p class="caption">Insira o seu número de beneficiário e ano de nascimento</p>

        <label>
          <span>Número de beneficiário</span>
          <input name="numero" type="text" inputmode="numeric" autocomplete="off" required>
        </label>

        <label>
          <span>Ano de nascimento</span>
          <input name="ano" type="number" inputmode="numeric" min="1900" max="2025" autocomplete="off" required>
        </label>

        <div id="login-error" class="error" hidden></div>

        <button type="submit" class="btn btn--primary">Entrar</button>
        <button type="button" id="skip-login" class="btn btn--ghost">Modo de teste — saltar login</button>
      </form>
    </section>

    <!-- ====== NÍVEIS ====== -->
    <section class="view" data-view="niveis" hidden>
      <header class="app-header">
        <h1>Quiz Mais Saúde</h1>
        <button id="logout" class="btn-icon" aria-label="Sair" title="Sair">↩</button>
      </header>
      <div class="niveis-intro">
        <h2>Escolha um nível</h2>
        <p class="caption">Toque num nível para começar.</p>
      </div>
      <ul id="niveis-list" class="niveis"></ul>
    </section>

    <!-- ====== QUIZ ====== -->
    <section class="view" data-view="quiz" hidden>
      <header class="app-header">
        <button id="quiz-back" class="btn-icon" aria-label="Voltar" title="Voltar">←</button>
        <h2 id="quiz-level-name"></h2>
        <span class="progress-text"><span id="q-current">1</span>/<span id="q-total">0</span></span>
      </header>
      <div class="progress-bar" aria-hidden="true"><div id="progress-fill" class="progress-fill"></div></div>
      <article class="question">
        <h1 id="question-text">A carregar…</h1>
        <ul id="options" class="options"></ul>
      </article>
      <p id="feedback" class="feedback" role="status" aria-live="polite" hidden></p>
    </section>

    <!-- ====== TERMINAR ====== -->
    <section class="view view--terminar" data-view="terminar" hidden>
      <div class="trophy-burst" aria-hidden="true">
        <div class="trophy">🏆</div>
      </div>
      <h1>Parabéns!</h1>
      <p>Nível concluído</p>
      <p id="score-text" class="score"></p>
      <button id="next-level" class="btn btn--primary">Próximo nível</button>
      <button id="back-to-levels" class="btn btn--ghost">Voltar à lista de níveis</button>
    </section>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./app.js"></script>
</body>
</html>
